<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Number Cipher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- ============================================================
       STYLES
  ============================================================ -->
  <style>
    /* ── CSS Variables ─────────────────────────────────────── */
    :root {
      --bg:        #060a10;
      --panel:     #0d1520;
      --border:    #1a2f4a;
      --accent:    #00e5ff;
      --accent2:   #ff3e6c;
      --green:     #00ff9d;
      --dim:       #3a5570;
      --text:      #c8dff0;
      --font-mono: 'Share Tech Mono', monospace;
      --font-hdr:  'Orbitron', sans-serif;
    }

    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Page Layout ───────────────────────────────────────── */
    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      color: var(--text);
      overflow: hidden;
    }

    /* Animated scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,229,255,0.015) 2px,
        rgba(0,229,255,0.015) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Subtle radial glow behind panel */
    body::after {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 700px; height: 600px;
      background: radial-gradient(ellipse, rgba(0,229,255,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Main Panel ─────────────────────────────────────────── */
    .panel {
      position: relative;
      width: min(520px, 95vw);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 40px 44px 36px;
      box-shadow:
        0 0 0 1px rgba(0,229,255,0.06),
        0 0 60px rgba(0,229,255,0.08),
        inset 0 1px 0 rgba(0,229,255,0.08);
      animation: fadeIn .5s ease both;
    }

    /* Corner decorations */
    .panel::before, .panel::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--accent);
      border-style: solid;
    }
    .panel::before { top: -1px; left: -1px;  border-width: 2px 0 0 2px; }
    .panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* ── Header ─────────────────────────────────────────────── */
    .header { text-align: center; margin-bottom: 32px; }

    .header .label {
      font-family: var(--font-mono);
      font-size: .65rem;
      letter-spacing: .25em;
      color: var(--accent);
      opacity: .7;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .header h1 {
      font-family: var(--font-hdr);
      font-size: 1.85rem;
      font-weight: 900;
      letter-spacing: .1em;
      color: #fff;
      text-shadow: 0 0 24px rgba(0,229,255,.5);
    }

    .header h1 span { color: var(--accent); }

    .header .subtitle {
      margin-top: 8px;
      font-size: .75rem;
      color: var(--dim);
      letter-spacing: .08em;
    }

    /* ── Divider ─────────────────────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    /* ── Stats Row ──────────────────────────────────────────── */
    .stats {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat {
      flex: 1;
      background: rgba(0,229,255,0.04);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 10px 14px;
      text-align: center;
    }

    .stat .key {
      font-size: .58rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 4px;
    }

    .stat .val {
      font-family: var(--font-hdr);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      transition: color .3s;
    }

    /* Turn red when attempts are low */
    .stat .val.danger { color: var(--accent2); text-shadow: 0 0 10px rgba(255,62,108,.5); }

    /* ── Input Row ──────────────────────────────────────────── */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="number"] {
      flex: 1;
      background: rgba(0,229,255,0.04);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0 16px;
      height: 48px;
      font-family: var(--font-hdr);
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: .08em;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      /* hide number spinners */
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { display: none; }

    input[type="number"]::placeholder { color: var(--dim); font-size: .8rem; letter-spacing: .12em; }

    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,255,.1);
    }

    input[type="number"]:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    /* ── Buttons ────────────────────────────────────────────── */
    .btn-primary {
      height: 48px;
      padding: 0 22px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 3px;
      font-family: var(--font-hdr);
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity .15s, transform .1s, box-shadow .2s;
      box-shadow: 0 0 18px rgba(0,229,255,.3);
      white-space: nowrap;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: .88;
      box-shadow: 0 0 28px rgba(0,229,255,.5);
    }

    .btn-primary:active:not(:disabled) { transform: translateY(1px); }

    .btn-primary:disabled {
      opacity: .25;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-restart {
      width: 100%;
      height: 42px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--dim);
      font-family: var(--font-hdr);
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 14px;
      transition: border-color .2s, color .2s;
    }

    .btn-restart:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Feedback Banner ────────────────────────────────────── */
    #feedback {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      padding: 10px 16px;
      font-size: .85rem;
      letter-spacing: .08em;
      text-align: center;
      margin-bottom: 20px;
      transition: background .3s, color .3s;
      border: 1px solid transparent;
    }

    #feedback.hidden   { background: transparent; color: transparent; border-color: transparent; }
    #feedback.low      { background: rgba(0,229,255,.07);  color: var(--accent);  border-color: rgba(0,229,255,.2); }
    #feedback.high     { background: rgba(255,62,108,.07); color: var(--accent2); border-color: rgba(255,62,108,.2); }
    #feedback.correct  { background: rgba(0,255,157,.07);  color: var(--green);   border-color: rgba(0,255,157,.25); }
    #feedback.gameover { background: rgba(255,62,108,.1);  color: var(--accent2); border-color: rgba(255,62,108,.3); }

    /* Pulse animation on feedback change */
    @keyframes pulse {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.015); }
      100% { transform: scale(1); }
    }
    #feedback.pulse { animation: pulse .25s ease; }

    /* ── Previous Guesses ───────────────────────────────────── */
    .history-label {
      font-size: .58rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 10px;
    }

    #history {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      min-height: 36px;
    }

    .guess-chip {
      background: rgba(0,229,255,0.05);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 4px 10px;
      font-family: var(--font-hdr);
      font-size: .75rem;
      font-weight: 700;
      color: var(--dim);
      letter-spacing: .08em;
      animation: chipIn .2s ease both;
    }

    /* Colour guesses relative to answer (revealed at game end) */
    .guess-chip.low    { color: var(--accent);  border-color: rgba(0,229,255,.25); }
    .guess-chip.high   { color: var(--accent2); border-color: rgba(255,62,108,.25); }
    .guess-chip.exact  { color: var(--green);   border-color: rgba(0,255,157,.3);  }

    @keyframes chipIn {
      from { opacity: 0; transform: scale(.8); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Fade-in for panel ──────────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       HTML
  ============================================================ -->
  <div class="panel">

    <!-- Header -->
    <header class="header">
      <p class="label">Decryption Protocol</p>
      <h1>NUM<span>CIPHER</span></h1>
      <p class="subtitle">Locate the hidden integer · 1 → 100</p>
    </header>

    <hr class="divider">

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="key">Attempts Left</div>
        <div class="val" id="attemptsLeft">10</div>
      </div>
      <div class="stat">
        <div class="key">Guesses Made</div>
        <div class="val" id="guessesMade">0</div>
      </div>
      <div class="stat">
        <div class="key">Range</div>
        <div class="val" style="font-size:1rem; padding-top:4px">1 – 100</div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-row">
      <input
        type="number"
        id="guessInput"
        min="1" max="100"
        placeholder="Enter 1–100"
        autocomplete="off"
      />
      <button class="btn-primary" id="submitBtn">Submit</button>
    </div>

    <!-- Feedback -->
    <div id="feedback" class="hidden" role="alert" aria-live="polite"></div>

    <!-- Previous Guesses -->
    <div class="history-label">Previous Guesses</div>
    <div id="history"></div>

    <!-- Restart -->
    <button class="btn-restart" id="restartBtn">↺ &nbsp;Restart Game</button>

  </div>

  <!-- ============================================================
       JAVASCRIPT
  ============================================================ -->
  <script>
    /* ─── Constants ────────────────────────────────────────── */
    const MAX_ATTEMPTS = 10;
    const MIN = 1;
    const MAX = 100;

    /* ─── State ─────────────────────────────────────────────── */
    let secretNumber;       // The number the player must guess
    let attemptsLeft;       // How many guesses remain
    let guesses;            // Array of past guess values
    let gameOver;           // Boolean – prevents further input

    /* ─── DOM References ─────────────────────────────────────── */
    const guessInput    = document.getElementById('guessInput');
    const submitBtn     = document.getElementById('submitBtn');
    const restartBtn    = document.getElementById('restartBtn');
    const feedbackEl    = document.getElementById('feedback');
    const attemptsLeftEl = document.getElementById('attemptsLeft');
    const guessesMadeEl  = document.getElementById('guessesMade');
    const historyEl     = document.getElementById('history');

    /* ─── Initialise / Reset ─────────────────────────────────── */
    const initGame = () => {
      // Pick a random integer in [MIN, MAX]
      secretNumber  = Math.floor(Math.random() * (MAX - MIN + 1)) + MIN;
      attemptsLeft  = MAX_ATTEMPTS;
      guesses       = [];
      gameOver      = false;

      // Reset UI
      guessInput.value   = '';
      guessInput.disabled = false;
      submitBtn.disabled  = false;
      historyEl.innerHTML = '';
      setFeedback('hidden', '');
      updateStats();
      guessInput.focus();
    };

    /* ─── Update Stats Display ───────────────────────────────── */
    const updateStats = () => {
      attemptsLeftEl.textContent = attemptsLeft;
      guessesMadeEl.textContent  = guesses.length;

      // Warn player when running low
      attemptsLeftEl.classList.toggle('danger', attemptsLeft <= 3);
    };

    /* ─── Set Feedback Banner ────────────────────────────────── */
    const setFeedback = (type, message) => {
      // Re-trigger pulse animation
      feedbackEl.classList.remove('pulse');
      void feedbackEl.offsetWidth; // reflow trick
      feedbackEl.className = type === 'hidden' ? 'hidden' : `${type} pulse`;
      feedbackEl.textContent = message;
    };

    /* ─── Add a Chip to the Guess History ────────────────────── */
    const addGuessChip = (value) => {
      const chip = document.createElement('span');
      chip.className  = 'guess-chip';
      chip.textContent = value;
      chip.dataset.value = value; // store for later colouring
      historyEl.appendChild(chip);
    };

    /* ─── Colour chips after game ends ──────────────────────── */
    const colourChips = () => {
      historyEl.querySelectorAll('.guess-chip').forEach(chip => {
        const val = Number(chip.dataset.value);
        if (val === secretNumber)     chip.classList.add('exact');
        else if (val < secretNumber)  chip.classList.add('low');
        else                          chip.classList.add('high');
      });
    };

    /* ─── Process a Guess ────────────────────────────────────── */
    const processGuess = () => {
      if (gameOver) return;

      const raw   = guessInput.value.trim();
      const guess = parseInt(raw, 10);

      // Validate input
      if (!raw || isNaN(guess) || guess < MIN || guess > MAX) {
        setFeedback('high', `⚠ Enter a whole number between ${MIN} and ${MAX}.`);
        guessInput.select();
        return;
      }

      // Check for duplicate
      if (guesses.includes(guess)) {
        setFeedback('high', `⚠ You already tried ${guess}. Pick a different number.`);
        guessInput.select();
        return;
      }

      // Record the guess
      guesses.push(guess);
      attemptsLeft--;
      addGuessChip(guess);
      updateStats();
      guessInput.value = '';

      // ── Evaluate guess ────────────────────────────────────── */
      if (guess === secretNumber) {
        /* ✓ Correct */
        setFeedback('correct', `✓ Decrypted! The number was ${secretNumber}. Solved in ${guesses.length} attempt${guesses.length > 1 ? 's' : ''}.`);
        endGame();

      } else if (attemptsLeft === 0) {
        /* ✗ Out of attempts */
        setFeedback('gameover', `✗ Game Over — The number was ${secretNumber}. Better luck next time.`);
        endGame();

      } else if (guess < secretNumber) {
        /* ↑ Too low */
        setFeedback('low', `↑ Too low — aim higher. ${attemptsLeft} attempt${attemptsLeft !== 1 ? 's' : ''} remaining.`);
        guessInput.focus();

      } else {
        /* ↓ Too high */
        setFeedback('high', `↓ Too high — come down a little. ${attemptsLeft} attempt${attemptsLeft !== 1 ? 's' : ''} remaining.`);
        guessInput.focus();
      }
    };

    /* ─── End Game (win or lose) ─────────────────────────────── */
    const endGame = () => {
      gameOver = true;
      guessInput.disabled = true;
      submitBtn.disabled  = true;
      colourChips(); // reveal which guesses were low / high / exact
    };

    /* ─── Event Listeners ────────────────────────────────────── */

    // Submit button click
    submitBtn.addEventListener('click', processGuess);

    // Allow Enter key to submit
    guessInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') processGuess();
    });

    // Restart button
    restartBtn.addEventListener('click', initGame);

    /* ─── Kick off the first game ────────────────────────────── */
    initGame();
  </script>

</body>
</html>
